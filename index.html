 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRM | TUDO EM UM SÓ LUGAR - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #050505; --secondary: #121212; --accent: #d4af37;
            --text-main: #ffffff; --text-dim: #a0a0a0; --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--primary); color: var(--text-main); line-height: 1.6; }

        /* --- HEADER --- */
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--accent); background: linear-gradient(to bottom, #1a1a1a, #050505); }
        .logo { font-size: 2.2rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

        /* --- NAVIGATION & FILTERS --- */
        .nav-section { position: sticky; top: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); z-index: 1000; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .filter-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; }
        .btn-cat { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: #1a1a1a; color: var(--text-dim); cursor: pointer; white-space: nowrap; font-size: 0.8rem; font-weight: 600; }
        .btn-cat.active { background: var(--accent); color: black; border-color: var(--accent); }
        .btn-sub { font-size: 0.7rem; padding: 5px 12px; background: #222; }

        /* --- VITRINE --- */
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--secondary); border-radius: 15px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 240px; object-fit: cover; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-brand { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .card-title { font-size: 0.95rem; font-weight: 600; margin: 5px 0; height: 2.5em; overflow: hidden; }
        
        /* ATRIBUTOS NO CARD */
        .attr-box { margin: 10px 0; display: flex; flex-direction: column; gap: 8px; }
        select.attr-select { width: 100%; padding: 8px; border-radius: 8px; background: #000; color: white; border: 1px solid #333; font-size: 0.75rem; }

        .price { font-size: 1.2rem; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
        .btn-buy { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-buy:hover { background: #b8962d; }

        /* --- PANELS --- */
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .panel-content { max-width: 500px; margin: 40px auto; background: var(--secondary); padding: 30px; border-radius: 20px; border: 1px solid var(--accent); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; background: #1a1a1a; color: white; border: 1px solid var(--border); }
        
        .cart-float { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1500; font-size: 1.5rem; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .badge { position: absolute; top: 0; right: 0; background: white; color: black; font-size: 0.7rem; font-weight: bold; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* --- ADMIN TABS --- */
        .admin-btn { position: fixed; bottom: 30px; left: 30px; font-size: 0.7rem; color: var(--text-dim); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">TUDO EM UM SÓ LUGAR</div>
        <p style="color: var(--text-dim); font-size: 0.8rem;">Direção: Félix Romeu Marcos</p>
    </header>

    <div class="nav-section">
        <div class="filter-container">
            <div class="scroll-row" id="main-cats">
                </div>
            <div class="scroll-row" id="sub-cats">
                </div>
        </div>
    </div>

    <main class="container">
        <div class="products-grid" id="product-display"></div>
    </main>

    <div id="cart-panel" class="panel">
        <div class="panel-content">
            <h2 style="color: var(--accent)">Seu Carrinho</h2>
            <div id="cart-items" style="margin: 20px 0;"></div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <h3>Endereço de Entrega</h3>
            <input type="text" id="cust-address" placeholder="Bairro, Rua, Casa nº">
            <input type="text" id="cust-name" placeholder="Seu Nome">
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800; margin: 15px 0;">
                <span>Total:</span> <span id="cart-total" style="color: var(--accent)">0 Kz</span>
            </div>
            <button class="btn-buy" style="background: #25d366; color: white;" onclick="checkout()">FINALIZAR WHATSAPP</button>
            <button class="btn-buy" style="background: transparent; color: #ff4444; margin-top: 10px;" onclick="closePanels()">FECHAR</button>
        </div>
    </div>

    <div id="admin-panel" class="panel">
        <div class="panel-content">
            <h2>Cadastrar Novo Produto</h2>
            <input type="text" id="adm-name" placeholder="Nome do Produto (Ex: iPhone 16 Pro)">
            <input type="number" id="adm-price" placeholder="Preço (Kz)">
            <input type="text" id="adm-img" placeholder="URL da Imagem">
            <select id="adm-cat-main">
                <option value="Smartphones">Smartphones</option>
                <option value="Perfumes">Perfumes</option>
                <option value="Moda">Moda</option>
                <option value="Calçados">Calçados</option>
                <option value="Desporto">Desporto</option>
                <option value="Relógios">Relógios</option>
                <option value="Acessórios">Acessórios</option>
            </select>
            <input type="text" id="adm-sub" placeholder="Sub-categoria (Ex: Apple, Zara, Árabe)">
            <button class="btn-buy" onclick="saveNewProduct()">CADASTRAR PRODUTO</button>
            <button class="btn-buy" style="background: #444; margin-top: 10px;" onclick="closePanels()">VOLTAR</button>
        </div>
    </div>

    <div class="cart-float" onclick="openCart()">
        🛒 <div class="badge" id="cart-badge">0</div>
    </div>

    <div class="admin-btn" onclick="openAdmin()">🔒 Acesso Admin</div>

        ];

        let cart = [];
        let activeMainCat = "Todos";
        let activeSubCat = "Todos";

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            renderNav();
            renderProducts();
        };

        function renderNav() {
            const mains = ["Todos", ...new Set(db.map(p => p.cat))];
            document.getElementById('main-cats').innerHTML = mains.map(m => `
                <button class="btn-cat ${m === activeMainCat ? 'active' : ''}" onclick="setMainCat('${m}')">${m}</button>
            `).join('');

            const subs = ["Todos", ...new Set(db.filter(p => activeMainCat === "Todos" || p.cat === activeMainCat).map(p => p.sub))];
            document.getElementById('sub-cats').innerHTML = subs.map(s => `
                <button class="btn-cat btn-sub ${s === activeSubCat ? 'active' : ''}" onclick="setSubCat('${s}')">${s}</button>
            `).join('');
        }

        function setMainCat(c) { activeMainCat = c; activeSubCat = "Todos"; renderNav(); renderProducts(); }
        function setSubCat(s) { activeSubCat = s; renderNav(); renderProducts(); }

        function renderProducts() {
            const filtered = db.filter(p => {
                return (activeMainCat === "Todos" || p.cat === activeMainCat) && (activeSubCat === "Todos" || p.sub === activeSubCat);
            });

            document.getElementById('product-display').innerHTML = filtered.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" class="card-img">
                    <div class="card-body">
                        <span class="card-brand">${p.sub}</span>
                        <h3 class="card-title">${p.name}</h3>
                        <div class="attr-box">
                            <select id="color-${i}" class="attr-select">
                                ${p.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                            </select>
                            <select id="size-${i}" class="attr-select">
                                ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="price">${p.price.toLocaleString()} Kz</div>
                        <button class="btn-buy" onclick="addToCart(${db.indexOf(p)}, ${i})">ADICIONAR</button>
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DO CARRINHO ---
        function addToCart(dbIndex, viewId) {
            const product = db[dbIndex];
            const color = document.getElementById(`color-${viewId}`).value;
            const size = document.getElementById(`size-${viewId}`).value;
            
            cart.push({ ...product, selectedColor: color, selectedSize: size });
            updateCartBadge();
            alert(`${product.name} adicionado!`);
        }

        function updateCartBadge() {
            document.getElementById('cart-badge').innerText = cart.length;
        }

        function openCart() {
            document.getElementById('cart-panel').style.display = 'block';
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, idx) => `
                <div style="display:flex; justify-content:space-between; margin:10px 0; font-size:0.8rem;">
                    <span>${item.name} (${item.selectedColor} - ${item.selectedSize})</span>
                    <span>${item.price.toLocaleString()} Kz</span>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + " Kz";
        }

        function checkout() {
            const addr = document.getElementById('cust-address').value;
            const name = document.getElementById('cust-name').value;
            if(!addr || !name || cart.length === 0) return alert("Preencha os dados e adicione itens!");

            let msg = `*PEDIDO FRM BOUTIQUE*%0A*Cliente:* ${name}%0A*Endereço:* ${addr}%0A%0A*Itens:*%0A`;
            cart.forEach(i => msg += `- ${i.name} [${i.selectedColor}/${i.selectedSize}]%0A`);
            msg += `%0A*TOTAL:* ${cart.reduce((s, i) => s + i.price, 0).toLocaleString()} Kz`;

            window.open(`https://wa.me/244941044772?text=${msg}`);
            cart = []; updateCartBadge(); closePanels();
        }

        // --- ADMIN ---
        function openAdmin() {
            const pass = prompt("Senha Administrativa:");
            if(pass === "felesema9") document.getElementById('admin-panel').style.display = 'block';
        }

        function saveNewProduct() {
            const n = document.getElementById('adm-name').value;
            const p = parseInt(document.getElementById('adm-price').value);
            const im = document.getElementById('adm-img').value;
            const c = document.getElementById('adm-cat-main').value;
            const s = document.getElementById('adm-sub').value;

            if(!n || !p) return alert("Erro nos campos!");

            db.push({
                name: n, price: p, cat: c, sub: s, img: im || "https://via.placeholder.com/400",
                options: ["Padrão"], sizes: ["Único"]
            });

            localStorage.setItem('frm_master_db', JSON.stringify(db));
            alert("Produto Salvo!");
            renderProducts();
            closePanels();
        }

        function closePanels() {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        }
