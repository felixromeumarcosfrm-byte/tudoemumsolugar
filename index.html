<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRM | TUDO EM UM SÓ LUGAR - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #050505;
            --secondary: #121212;
            --accent: #d4af37;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--primary);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            background: linear-gradient(to bottom, #1a1a1a, #050505);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* --- NAVEGAÇÃO --- */
        .nav-section {
            background: var(--secondary);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .cat-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 20px;
            scrollbar-width: none;
        }

        .cat-container::-webkit-scrollbar { display: none; }

        .btn-cat {
            padding: 10px 22px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-cat.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .btn-sub { font-size: 0.75rem; background: rgba(255,255,255,0.05); }

        /* --- VITRINE --- */
        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--secondary);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            filter: grayscale(20%);
            transition: 0.5s;
        }

        .card:hover .card-img { filter: grayscale(0%); transform: scale(1.05); }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

        .card-brand {
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-title { font-size: 1.2rem; margin-bottom: 15px; font-weight: 700; color: #fff; }

        .attr-box { display: flex; gap: 10px; margin-bottom: 20px; }

        .attr-select {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            outline: none;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .btn-buy {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-buy:hover { background: #fff; transform: scale(1.02); }

        /* --- CARRINHO --- */
        .cart-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: var(--primary);
            width: 65px;
            height: 65px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            z-index: 2000;
            transition: 0.3s;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff3b3b;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        /* --- PAINÉIS --- */
        .panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--secondary);
            width: 95%;
            max-width: 500px;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            z-index: 3000;
            max-height: 90vh;
            overflow-y: auto;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 2500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
        }
    </style>
</head>

    <div class="nav-section">
        <div class="container">
            <div id="main-cats" class="cat-container"></div>

        </div>
    </div>

    <main class="container">
        <div id="product-display" class="grid"></div>
    </main>

    <div class="cart-icon" onclick="openCart()">

        ];

        let cart = [];
        let activeMainCat = "Todos";
        let activeSubCat = "Todos";

        // --- INICIALIZAÇÃO ---
        DOMContentLoaded = () => {
            renderNav();
            renderProducts();
        };

        function renderNav() {
            const mains = ["Todos", ...new Set(db.map(p => p.cat))];
            document.getElementById('main-cats').innerHTML = mains.map(m => `
                <button class="btn-cat ${m === activeMainCat ? 'active' : ''}" onclick="setMainCat('${m}')">${m}</button>
            `).join('');

            const subs = ["Todos", ...new Set(db.filter(p => activeMainCat === "Todos" || p.cat === activeMainCat).map(p => p.sub))];
            document.getElementById('sub-cats').innerHTML = subs.map(s => `
                <button class="btn-cat btn-sub ${s === activeSubCat ? 'active' : ''}" onclick="setSubCat('${s}')">${s}</button>
            `).join('');
        }

        function setMainCat(c) { activeMainCat = c; activeSubCat = "Todos"; renderNav(); renderProducts(); }
        function setSubCat(s) { activeSubCat = s; renderNav(); renderProducts(); }

        function renderProducts() {
            const filtered = db.filter(p => {
                return (activeMainCat === "Todos" || p.cat === activeMainCat) && (activeSubCat === "Todos" || p.sub === activeSubCat);
            });

            document.getElementById('product-display').innerHTML = filtered.map((p, i) => `
                <div class="card">
                    <img src="${p.img}" class="card-img">
                    <div class="card-body">
                        <span class="card-brand">${p.sub}</span>
                        <h3 class="card-title">${p.name}</h3>
                        <div class="attr-box">
                            <select id="color-${i}" class="attr-select">
                                ${p.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                            </select>
                            <select id="size-${i}" class="attr-select">
                                ${p.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>
                        <div class="price">${p.price.toLocaleString()} Kz</div>
                        <button class="btn-buy" onclick="addToCart(${db.indexOf(p)}, ${i})">ADICIONAR</button>
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DO CARRINHO ---
        function addToCart(dbIndex, viewId) {
            const product = db[dbIndex];
            const color = document.getElementById(`color-${viewId}`).value;
            const size = document.getElementById(`size-${viewId}`).value;
            
            cart.push({ ...product, selectedColor: color, selectedSize: size });
            updateCartBadge();
            alert(`${product.name} adicionado!`);
        }

        function updateCartBadge() {
            document.getElementById('cart-badge').innerText = cart.length;
        }

        function openCart() {
            document.getElementById('cart-panel').style.display = 'block';
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, idx) => `
                <div style="display:flex; justify-content:space-between; margin:10px 0; font-size:0.8rem;">
                    <span>${item.name} (${item.selectedColor} - ${item.selectedSize})</span>
                    <span>${item.price.toLocaleString()} Kz</span>
                </div>
            `).join('');
            
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + " Kz";
        }

        function checkout() {
            const addr = document.getElementById('cust-address').value;
            const name = document.getElementById('cust-name').value;
            if(!addr || !name || cart.length === 0) return alert("Preencha os dados e adicione itens!");

            let msg = `*PEDIDO FRM BOUTIQUE*%0A*Cliente:* ${name}%0A*Endereço:* ${addr}%0A%0A*Itens:*%0A`;
            cart.forEach(i => msg += `- ${i.name} [${i.selectedColor}/${i.selectedSize}]%0A`);
            msg += `%0A*TOTAL:* ${cart.reduce((s, i) => s + i.price, 0).toLocaleString()} Kz`;

            window.open(`https://wa.me/244941044772?text=${msg}`);
            cart = []; updateCartBadge(); closePanels();
        }

        // --- ADMIN ---
        function openAdmin() {
            const pass = prompt("Senha Administrativa:");
            if(pass === "felesema9") document.getElementById('admin-panel').style.display = 'block';
        }

        function saveNewProduct() {
            const n = document.getElementById('adm-name').value;
            const p = parseInt(document.getElementById('adm-price').value);
            const im = document.getElementById('adm-img').value;
            const c = document.getElementById('adm-cat-main').value;
            const s = document.getElementById('adm-sub').value;

            if(!n || !p) return alert("Erro nos campos!");

            db.push({
                name: n, price: p, cat: c, sub: s, img: im || "https://via.placeholder.com/400",
                options: ["Padrão"], sizes: ["Único"]
            });

            localStorage.setItem('frm_master_db', JSON.stringify(db));
            alert("Produto Salvo!");
            renderProducts();
            closePanels();
        }

        function closePanels() {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        }
